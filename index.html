<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalan-Jalan Yuk!</title>
    <style>
        /* CSS Langsung di Sini */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe4e1; /* Pink muda */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff69b4; /* Hot Pink */
            font-size: 24px;
            margin-bottom: 20px;
        }

        .sticker {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #btnYa {
            background-color: #ff69b4;
            color: white;
        }

        #btnYa:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }

        #btnTidak {
            background-color: #f0f0f0;
            color: #888;
            position: relative;
            z-index: 10;
        }

        /* Pesan Tersembunyi */
        #pesanBerhasil {
            display: none;
        }

        #pesanBerhasil h2 {
            color: #ff1493;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="kontenUtama">
            <span class="sticker">🎒✨</span>
            <h1>Halo Bestie! Jalan-jalan yuk bareng aku? 🍦</h1>
            <div class="buttons">
                <button id="btnYa" onclick="tampilkanPesan()">YA!</button>
                <button id="btnTidak" onmouseover="pindahTombol()" onclick="pindahTombol()">TIDAK</button>
            </div>
        </div>

        <div id="pesanBerhasil">
            <span class="sticker">🥳💖</span>
            <h2>Yeeayyy!</h2>
            <p>Okee, kabarin ya kalau kamu sudah siap. Kita bakal seru-seruan bareng! 🚗💨</p>
        </div>
    </div>

    <script>
        // JavaScript untuk Interaksi
        function pindahTombol() {
            const btnTidak = document.getElementById('btnTidak');
            
            // Menghitung area aman agar tombol tidak keluar dari layar
            const x = Math.random() * (window.innerWidth - btnTidak.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnTidak.offsetHeight);

            // Mengubah posisi tombol menjadi absolut
            btnTidak.style.position = 'fixed';
            btnTidak.style.left = x + 'px';
            btnTidak.style.top = y + 'px';
        }

        function tampilkanPesan() {
            document.getElementById('kontenUtama').style.display = 'none';
            document.getElementById('pesanBerhasil').style.display = 'block';
            
            // Tambahkan efek konfeti sederhana jika mau
            document.body.style.backgroundColor = "#ffb6c1";
        }
    </script>

</body>
  </html>
